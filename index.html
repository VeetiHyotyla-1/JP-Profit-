<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JP-Profit</title>
    <link rel="stylesheet" href="tyylitiedosto.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="#" class="nav-logo">JP-Profit</a>
            <ul class="nav-menu">
                <li class="nav-item"><a href="#" class="nav-link">Koti</a></li>
                <li class="nav-item"><a href="#tarjouspyyntö" class="nav-link">Lomake</a></li>
                <li class="nav-item"><a href="#" class="nav-link">Ota yhteyttä</a></li>
                <li class="nav-item"><a href="#" class="nav-link btn-login">Kirjaudu</a></li>
            </ul>
            <div class="nav-toggle" id="mobile-menu">
                <i class="fas fa-bars"></i>
            </div>
        </div>
    </nav>

    <header class="hero-osio">
        <div class="hero-container">
            <div class="hero-teksti">
                <h1>Testi pääteksti</h1>
                <p>Testi alateksti</p>
            </div>

            <div class="hero-galleria">
                <button class="nuoli-btn vasen" id="edellinen-kuva">
                    <i class="fas fa-chevron-left"></i>
                </button>
                
                <div class="esittelykuva">
                    <img src="https://images.unsplash.com/photo-1541888946425-d81bb19240f5?q=80&w=600" id="galleria-kuva" alt="Työmaakuva">
                </div>

                <button class="nuoli-btn oikea" id="kuvanvaihto">
                    <i class="fas fa-chevron-right"></i>
                </button>
            </div>
        </div>
    </header>

    <section class="lomake-osio" id="tarjouspyyntö">
        <div class="lomake-container">
            <h2>Pyydä Tarjous</h2>
            <p>Lomakkeessa voit jättää yhteydenottopyynnön tai tehdä esimerkiksi urakkatyötarjouksen.</p>
            
            <form class="tarjous-lomake">
                <div class="lomake-ryhmä">
                    <label for="nimi">Nimi / Yritys *</label>
                    <input type="text" id="nimi" required placeholder="Etunimi Sukunimi tai Yritys">
                </div>
                
                <div class="lomake-ryhmä">
                    <label for="sahkoposti">Sähköposti *</label>
                    <input type="email" id="sahkoposti" required placeholder="Sähköposti@esimerkki.fi">
                </div>
                
                <div class="lomake-ryhmä">
                    <label for="puhelin">Puhelinnumero</label>
                    <input type="tel" id="puhelin" placeholder="040 123 4567">
                </div>
                
                <div class="lomake-ryhmä">
                    <label for="viesti">Työn kuvaus *</label>
                    <textarea id="viesti" rows="5" required placeholder="Kerro lyhyesti mitä työtä tai urakkaa tarjoat..."></textarea>
                </div>
                
                <button type="submit" class="btn-laheta">Lähetä tarjouspyyntö</button>
            </form>
        </div>
    </section>

    <script src="js.js"></script>
</body>
</html>
